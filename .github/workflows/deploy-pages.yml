name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages.
# Runs on pushes to main (after the PR merges) and to the current feature
# branch (so it can go live right now), plus a manual "Run workflow" button.
on:
  push:
    branches:
      - main
      - claude/guess-animal-game-thiirr
  workflow_dispatch:

# Permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically if it isn't already.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the site (it's a plain static site).
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
